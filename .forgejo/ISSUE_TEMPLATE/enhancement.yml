name: Enhancement
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Enhancement Proposal
        Please note: We are selective about new features. Please ensure your proposal aligns with the project's goals.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of zix would this enhance?
      options:
        - http
        - http1
        - http2
        - http3
        - grpc
        - udp
        - uds
        - tcp
        - fix
        - tls
        - channel
        - logger
        - driver
        - server
        - client
        - general
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: "What problem does this enhancement solve?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: "Describe your proposed solution in detail"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "What alternative solutions have you considered?"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Any additional context, examples, or references"
    validations:
      required: false
