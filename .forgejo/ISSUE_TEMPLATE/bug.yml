name: Bug Report
description: Something is not working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Remember to search before filing a new report
        Please search for this bug in the issue tracker to avoid duplicates.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of zix is affected?
      options:
        - http
        - http1
        - http2
        - http3
        - grpc
        - udp
        - uds
        - tcp
        - fix
        - tls
        - channel
        - logger
        - driver
        - server
        - client
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Zix Version
      description: "The version or commit hash you are using"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: "What exactly can someone else do to observe the problem?"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true
